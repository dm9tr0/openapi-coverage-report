name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - name: Compile
        run: ./gradlew assemble --no-daemon
      - name: Unit tests
        run: ./gradlew test --no-daemon
